name: Crawl YouTube Sources

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:       # 允許手動觸發

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install yt-dlp
        run: pip install -q yt-dlp

      - name: Run crawl
        run: pnpm crawl:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configure git
        run: |
          git config user.name "a920604a"
          git config user.email "a920604a@gmail.com"

      - name: Commit and push new articles
        id: commit
        run: |
          git add src/content/posts/
          if git diff --cached --quiet; then
            echo "無新文章，跳過 commit。"
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "crawl: add new articles from YouTube sources"
            git push
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        if: steps.commit.outputs.has_new == 'true'
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.has_new == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=engineer-news