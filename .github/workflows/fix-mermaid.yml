name: Fix Mermaid Syntax

on:
  schedule:
    - cron: '0 3 * * *'   # 每天 03:00 UTC 執行
  workflow_dispatch:       # 允許手動觸發

jobs:
  fix-mermaid:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run fix-mermaid skill
        run: |
          claude --print --dangerously-skip-permissions \
            "/fix-mermaid" \
          2>&1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Configure git
        run: |
          git config user.name "a920604a"
          git config user.email "a920604a@gmail.com"

      - name: Commit fixes if any
        run: |
          git add src/content/posts/
          if git diff --cached --quiet; then
            echo "No mermaid fixes needed."
          else
            git commit -m "fix: auto-fix mermaid syntax errors in posts"
            git pull --rebase origin main
            git push
          fi
