name: Fix Mermaid Syntax

on:
  schedule:
    - cron: '0 1 * * *'    # 每天 01:00 UTC 執行
  workflow_dispatch:       # 允許手動觸發

jobs:
  fix-mermaid:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Run fix-mermaid
        run: pnpm fix-mermaid
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "a920604a"
          git config user.email "a920604a@gmail.com"

      - name: Commit fixes if any
        id: commit
        run: |
          git add src/content/posts/
          if git diff --cached --quiet; then
            echo "No mermaid fixes needed."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "fix: auto-fix mermaid syntax errors in posts"
            git pull --rebase origin main
            git push
            echo "has_fixes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        if: steps.commit.outputs.has_fixes == 'true'
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.has_fixes == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=engineer-news
